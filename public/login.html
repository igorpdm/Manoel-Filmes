<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Manoel Filmes</title>
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 3rem;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            border-radius: 50%;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .login-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: #5865F2;
            color: white;
            padding: 0.875rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .login-btn:hover {
            background: #4752C4;
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn svg {
            width: 24px;
            height: 24px;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-info {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .login-info a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .login-info a:hover {
            text-decoration: underline;
        }

        .loading-state {
            display: none;
        }

        .loading-state.active {
            display: block;
        }

        .loading-state .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 1rem;
        }
    </style>
</head>

<body>
    <div class="background-animation"></div>
    <div class="login-container">
        <div class="login-card">
            <img src="/logo.jpg" alt="Manoel Filmes" class="login-logo">
            
            <div id="login-content">
                <h1 class="login-title">Entrar na Sessão</h1>
                <p class="login-subtitle">Faça login com sua conta do Discord para participar da sessão de cinema.</p>

                <div id="error-message" class="login-error" style="display: none;"></div>

                <a href="#" id="login-btn" class="login-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                    </svg>
                    Entrar com Discord
                </a>

                <p class="login-info">
                    Ao entrar, você concorda com nossos termos de uso.
                </p>
            </div>

            <div id="loading-state" class="loading-state">
                <div class="spinner"></div>
                <p>Conectando com Discord...</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            const redirect = urlParams.get('redirect') || '/';
            
            const loginBtn = document.getElementById('login-btn');
            const errorMessage = document.getElementById('error-message');
            const loginContent = document.getElementById('login-content');
            const loadingState = document.getElementById('loading-state');

            if (error) {
                const errorMessages = {
                    'access_denied': 'Você cancelou a autorização. Tente novamente para entrar na sessão.',
                    'invalid_request': 'Requisição inválida. Tente novamente.',
                    'server_error': 'Erro no servidor do Discord. Tente novamente em alguns instantes.',
                    'default': 'Ocorreu um erro na autenticação. Tente novamente.'
                };
                
                errorMessage.textContent = errorMessages[error] || errorMessages.default;
                errorMessage.style.display = 'block';
            }

            loginBtn.href = `/api/oauth/login?redirect=${encodeURIComponent(redirect)}`;

            loginBtn.addEventListener('click', function() {
                loginContent.style.display = 'none';
                loadingState.classList.add('active');
            });
        })();
    </script>
</body>

</html>
